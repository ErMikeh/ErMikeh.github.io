                    <label for="nombre" aria-label="Campo para escribir el nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" required>

                    <label for="mensaje" aria-label="Campo para escribir el mensaje">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" rows="4" required></textarea>

                </form>
